<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>建筑施工项目进度管理平台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <div id="login-page" class="page active">
            <div class="login-container">
                <div class="login-header">
                    <div class="logo">🏗️</div>
                    <h1>建筑施工项目进度管理平台</h1>
                    <p>Construction Project Progress Management</p>
                </div>
                <form id="login-form" class="login-form">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="username" placeholder="请输入用户名" required>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="password" placeholder="请输入密码" required>
                    </div>
                    <div class="role-selector">
                        <label>选择角色（快速登录）</label>
                        <div class="role-buttons">
                            <button type="button" class="role-btn" data-role="project_manager" data-username="admin" data-password="123456">
                                <span class="role-icon">👔</span>
                                <span>项目经理</span>
                            </button>
                            <button type="button" class="role-btn" data-role="foreman" data-username="worker1" data-password="123456">
                                <span class="role-icon">👷</span>
                                <span>班组长</span>
                            </button>
                            <button type="button" class="role-btn" data-role="supervisor" data-username="supervisor1" data-password="123456">
                                <span class="role-icon">📋</span>
                                <span>监理</span>
                            </button>
                            <button type="button" class="role-btn" data-role="owner" data-username="owner1" data-password="123456">
                                <span class="role-icon">🏢</span>
                                <span>业主</span>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">登 录</button>
                </form>
                <div class="login-footer">
                    <p>© 2024 建筑施工项目进度管理平台</p>
                </div>
            </div>
        </div>

        <div id="main-app" class="page">
            <div class="app-layout">
                <aside class="sidebar">
                    <div class="sidebar-header">
                        <div class="logo">🏗️</div>
                        <div class="app-title">
                            <h2>项目管理平台</h2>
                        </div>
                    </div>
                    <nav class="sidebar-nav" id="sidebar-nav">
                    </nav>
                    <div class="sidebar-footer">
                        <div class="user-info" id="user-info">
                        </div>
                        <button id="logout-btn" class="btn btn-danger btn-block">退出登录</button>
                    </div>
                </aside>

                <main class="main-content">
                    <header class="topbar">
                        <div class="topbar-left">
                            <h1 id="page-title">项目列表</h1>
                        </div>
                        <div class="topbar-right">
                            <div class="notification-bell" id="notification-bell">
                                <span class="bell-icon">🔔</span>
                                <span class="badge" id="notification-badge" style="display: none;">0</span>
                            </div>
                        </div>
                    </header>

                    <div class="content-area" id="content-area">
                    </div>
                </main>
            </div>
        </div>
    </div>

    <div id="modal-container"></div>

    <script src="js/app.js"></script>
    <script src="js/gantt.js"></script>
</body>
</html>
